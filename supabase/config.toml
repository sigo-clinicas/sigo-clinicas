# Configuração do Supabase CLI (dev local). Produção: projeto Supabase Cloud
# em sa-east-1 (São Paulo) — LGPD + latência (CLAUDE.md §2).
project_id = "sigo-clinicas"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Custom Access Token Hook — injeta papel + clínica(s) nos claims do JWT.
# Em produção, habilitar o mesmo hook em Auth > Hooks no dashboard.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[storage]
enabled = true
file_size_limit = "50MiB"
